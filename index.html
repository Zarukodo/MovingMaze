<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovingMaze | 移動迷宮：最終版</title>
    <style>
        /* --- 基礎佈局 (高度解耦) --- */
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            color: #eee;
        }

        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- 側邊選單 (玻璃質感) --- */
        #side-menu {
            width: 320px;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 { margin: 0; font-size: 28px; color: #f2cb2f; text-shadow: 0 0 10px rgba(242, 203, 47, 0.3); }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 10px; }

        /* --- 控制群組 --- */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label { font-size: 14px; font-weight: bold; color: #bbb; }
        .val-display { float: right; color: #64c8ff; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #64c8ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
            transition: transform 0.2s;
        }

        /* --- 玻璃質感按鈕 --- */
        .glass-btn {
            background: rgba(100, 200, 255, 0.15);
            border: 1px solid rgba(100, 200, 255, 0.4);
            color: #fff;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
        }

        .glass-btn:hover {
            background: rgba(100, 200, 255, 0.3);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            transform: translateY(-2px);
        }

        .glass-btn.paused {
            background: rgba(255, 80, 80, 0.2);
            border-color: rgba(255, 80, 80, 0.5);
        }

        /* --- 遊戲主區域 --- */
        #game-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #252525 0%, #1a1a1a 100%);
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            max-width: 95%;
            max-height: 95%;
        }

        /* --- 結算畫面 (預設隱藏) --- */
        #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #end-screen.visible { opacity: 1; pointer-events: auto; }

        .end-panel {
            background: #222;
            padding: 50px 80px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        #end-title { font-size: 48px; margin: 0 0 10px 0; color: #ff5050; }
    </style>
</head>
<body>

    <div id="app-container">
        <aside id="side-menu">
            <h1>移動迷宮</h1>
            <p class="subtitle">PROJECT: MOVING MAZE v2.0</p>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

            <div class="control-group">
                <label>迷宮複雜度 <span id="density-val" class="val-display">25%</span></label>
                <input type="range" id="density-slider" min="10" max="60" value="25">
            </div>

            <div class="control-group">
                <label>地形變異頻率 <span id="mutation-val" class="val-display">1.0s</span></label>
                <input type="range" id="mutation-slider" min="500" max="5000" step="100" value="1000">
            </div>

            <div class="control-group" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-top: 10px;">
                <label>操作指南</label>
                <p style="font-size: 12px; color: #888; line-height: 1.6; margin: 5px 0 0 0;">
                    使用 <span style="color: #64c8ff;">WASD</span> 或 <span style="color: #64c8ff;">方向鍵</span> 移動<br>
                    找到 <span style="color: #32ff64;">綠色傳送門</span> 以獲勝<br>
                    避開 <span style="color: #ff3250;">紅色幽靈</span> 的追擊
                </p>
            </div>

            <button id="toggle-game-btn" class="glass-btn">▶ 開始遊戲</button>
        </aside>

        <main id="game-wrapper">
            <canvas id="gameCanvas"></canvas>

            <div id="end-screen">
                <div class="end-panel">
                    <h1 id="end-title">GAME OVER</h1>
                    <p id="end-msg">你被幽靈抓到了...</p>
                    <button id="restart-btn" class="glass-btn" style="width: 100%;">🔄 重新開始</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
